<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DevChat OS | Accès Restreint</title>
    <style>
      /* --- STYLE DE BASE POUR ESSAI DE CONNECTION--- */
      :root {
        --primary: #00a884;
        --danger: #ef4444;
        --bg-space: #090e11;
        --glass: rgba(34, 45, 52, 0.9);
      }

      body {
        margin: 0;
        font-family: "Segoe UI", sans-serif;
        background: var(--bg-space);
        color: white;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        overflow: hidden;
      }

      /* --- ÉCRAN DE CONNEXION (LA CARTE) --- */
      #auth-layer {
        position: fixed;
        width: 100%;
        height: 100%;
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 1000;
        background: radial-gradient(circle, #111b21 0%, #090e11 100%);
      }

      .login-card {
        background: var(--glass);
        padding: 40px;
        border-radius: 20px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        width: 320px;
        text-align: center;
        backdrop-filter: blur(10px);
        transition: all 0.5s ease;
      }

      .login-card h1 {
        font-size: 24px;
        color: var(--primary);
        margin-bottom: 10px;
      }

      .login-card p {
        font-size: 13px;
        color: #8696a0;
        margin-bottom: 25px;
      }

      .input-group {
        margin-bottom: 15px;
        text-align: left;
      }

      label {
        font-size: 11px;
        text-transform: uppercase;
        color: var(--primary);
        margin-left: 5px;
      }

      input {
        width: 100%;
        padding: 12px;
        margin-top: 5px;
        border-radius: 10px;
        border: none;
        background: #2a3942;
        color: white;
        outline: none;
        box-sizing: border-box;
      }

      button {
        width: 100%;
        padding: 14px;
        border-radius: 10px;
        border: none;
        background: var(--primary);
        color: white;
        font-weight: bold;
        cursor: pointer;
        margin-top: 10px;
        transition: 0.3s;
      }

      button:hover {
        background: #01755b;
      }

      /* Animation d'erreur */
      .shake {
        animation: shake 0.4s;
        background: var(--danger) !important;
      }
      @keyframes shake {
        0%,
        100% {
          transform: translateX(0);
        }
        25% {
          transform: translateX(-10px);
        }
        75% {
          transform: translateX(10px);
        }
      }

      /* --- LE SITE (CACHÉ AU DÉPART) --- */
      #main-site {
        display: none; /* Cache le site */
        width: 100%;
        height: 100%;
        flex-direction: column;
        opacity: 0;
        transition: opacity 1s ease;
      }

      .header-site {
        background: #202c33;
        padding: 20px;
        text-align: center;
        border-bottom: 1px solid #2f3b43;
      }
    </style>
  </head>
  <body>
    <!-- ÉTAPE 1 : LA CARTE DE CONNEXION -->
    <div id="auth-layer">
      <div class="login-card" id="card">
        <h1>DevChat V3</h1>
        <p>Espace réservé aux administrateurs</p>

        <div class="input-group">
          <label>Nom d'utilisateur</label>
          <input type="text" id="username" placeholder="Ex: GLOIRE" />
        </div>

        <div class="input-group">
          <label>Code d'accès</label>
          <input type="password" id="passcode" placeholder="••••" />
        </div>

        <button onclick="validateLogin()" id="loginBtn">S'authentifier</button>
      </div>
    </div>

    <!-- ÉTAPE 2 : LE SITE BEAU ET PROPRE -->
    <div id="main-site">
      <header class="header-site">
        <h2 id="welcome-text">Bienvenue Admin</h2>
        <span style="color: var(--primary); font-size: 12px"
          >● Système en ligne</span
        >
      </header>

      <div
        style="
          flex: 1;
          display: flex;
          justify-content: center;
          align-items: center;
          flex-direction: column;
          padding: 20px;
        "
      >
        <div
          style="
            background: #202c33;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            border: 1px solid #2f3b43;
          "
        >
          <h3>Status du Projet</h3>
          <p style="color: #8696a0">
            Le module de chat est en cours d'intégration...
          </p>
          <div
            style="
              width: 200px;
              height: 10px;
              background: #111b21;
              border-radius: 5px;
              margin-top: 20px;
              overflow: hidden;
            "
          >
            <div
              style="width: 65%; height: 100%; background: var(--primary)"
            ></div>
          </div>
          <p style="font-size: 10px; margin-top: 10px">Progression : 65%</p>
        </div>
      </div>
    </div>

    <script>
      // La base de données locale des admins
      const ADMINS = ["RUPHIN", "GLOIRE", "JAPHET", "BASIRWA"];
      const MASTER_CODE = "2024"; // Ton code secret

      function validateLogin() {
        const user = document
          .getElementById("username")
          .value.trim()
          .toUpperCase();
        const code = document.getElementById("passcode").value;
        const card = document.getElementById("card");
        const btn = document.getElementById("loginBtn");

        if (ADMINS.includes(user) && code === MASTER_CODE) {
          // Succès !
          unlockSystem(user);
        } else {
          // Échec !
          card.classList.add("shake");
          btn.innerText = "ACCÈS REFUSÉ";
          setTimeout(() => {
            card.classList.remove("shake");
            btn.innerText = "S'authentifier";
          }, 1000);
        }
      }

      function unlockSystem(name) {
        const authLayer = document.getElementById("auth-layer");
        const mainSite = document.getElementById("main-site");

        // Animation de sortie
        authLayer.style.opacity = "0";
        authLayer.style.pointerEvents = "none";

        setTimeout(() => {
          authLayer.style.display = "none";
          mainSite.style.display = "flex";
          setTimeout(() => {
            mainSite.style.opacity = "1";
            document.getElementById("welcome-text").innerText =
              "Salut " + name + " !";
          }, 100);
        }, 500);
      }
    </script>
  </body>
</html>
