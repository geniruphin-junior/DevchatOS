<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DevChat OS | Admin Portal</title>
    <link rel="icon" type="image/jpeg" href="IMG-20260510-WA0001.jpg" />
    <link rel="stylesheet" href="post.css" />
  </head>
  <body>
    <!-- ÉCRAN DE CONNEXION PRÉPARÉ -->

    <div id="auth-layer">
      <div class="login-card" id="card">
        <h1>DevChat V3</h1>
        <p>Accès restreint au Groupe Admin</p>

        <div style="text-align: left">
          <input
            type="text"
            title="Placez votre nom pour une connexion plus sereine"
            id="userIn"
            placeholder="Nom Admin"
            required
          />
          <input
            type="password"
            title="et ici notre mot de passe si non nous vous prierons de vous en allez"
            id="passIn"
            placeholder="Code Secret"
            required
          />
        </div>

        <button
          id="btnAuth"
          class="btnRun"
          style="width: 100%; margin-top: 15px; height: 50px"
        >
          S'IDENTIFIER
        </button>
      </div>
    </div>

    <!-- STRUCTURE DU SITE SÉPARÉE (STYLE WINDOWS 11) -->
    <div id="main-site">
      <button id="toogleSidebar" class="access-btn">☰</button>
      <div id="overlay"></div>
      <aside class="sidebar" id="sidebar">
        <div class="side-header">💻 ÉQUIPE ADMIN</div>
        <div class="admin-list">
          <div class="admin-item">
            <div class="avatar letter-r" style="color: aqua">R</div>
            <span>RUPHIN</span>
          </div>
          <div class="admin-item">
            <div class="avatar letter-g" style="color: rgb(218, 90, 90)">G</div>
            <span>GLOIRE</span>
          </div>
          <div class="admin-item">
            <div class="avatar letter-j" style="color: blue">J</div>
            <span>JAPHET</span>
          </div>
          <div class="admin-item">
            <div class="avatar letter-b" style="color: green">J</div>
            <span>JULES</span>
          </div>
        </div>
      </aside>

      <main class="chat-area">
        <header class="chat-header">
          <strong id="display-name" style="font-size: 18px">Admin</strong>
          <div class="session-status">Session sécurisée active</div>
        </header>

        <div class="messages-box" id="msgBox">
          <div class="msg received">
            <span class="msg-info sys-info"></span>
            Bienvenue chers membres du groupe notre mission est de faire de nous
            les meilleurs. Tous les échanges sont cryptés.
          </div>
        </div>

        <footer class="chat-input-area">
          <input
            type="text"
            id="chatInput"
            placeholder="Écrire un message..."
            
          />
          <button class="btn-send" id="sendBtn">➤</button>
        </footer>
      </main>
    </div>

    <script src="script.js"></script>
  </body>
</html>
